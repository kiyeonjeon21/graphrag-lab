name: "All 12 Frameworks Comparison"
description: "Compare all available GraphRAG frameworks on the same dataset"

dataset:
  name: sample_articles
  path: data/sample
  domain: general

frameworks:
  # === Established ===
  - name: microsoft
    search_type: local
  - name: lightrag
    search_type: hybrid
  - name: nano
    search_type: local
  - name: fast

  # === Graph DB-backed ===
  - name: neo4j
    search_type: vector_cypher
  - name: datastax
    extra:
      edges: [[keywords, keywords]]
      strategy: eager

  # === Next-gen (2025-2026) ===
  - name: cognee
  - name: graphiti
  - name: raganything
    search_type: hybrid
  - name: hipporag
  - name: linearrag
  - name: pathrag
    search_type: path

queries:
  - "What are the main themes discussed across all documents?"
  - "How are the key entities related to each other?"
  - "Summarize the most important findings mentioned in the documents."
  - "What are the contrasting viewpoints presented?"
  - "Identify the causal relationships described in the text."

llm:
  model: gpt-5.4-mini
